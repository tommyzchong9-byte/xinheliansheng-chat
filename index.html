<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>新和联胜</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --sidebar-bg: #f8f9fa;
    --border: #e8eaed;
    --text: #1a1a1a;
    --text-muted: #8a8a8a;
    --accent: #1a1a1a;
    --accent-light: #f0f0f0;
    --hover: #f4f4f4;
    --msg-other: #f7f7f7;
    --online: #22c55e;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
    --radius: 12px;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ── Login Screen ── */
  #loginScreen {
    position: fixed; inset: 0;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    flex-direction: column;
    gap: 0;
  }

  .login-box {
    width: 360px;
    padding: 48px 40px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 20px;
  }

  .login-logo {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
    color: var(--text);
  }

  .login-sub {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 36px;
  }

  .login-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
    display: block;
  }

  .login-input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    font-family: var(--font);
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 12px;
    background: #fff;
    color: var(--text);
  }

  .login-input:focus { border-color: var(--text); }

  .login-btn {
    width: 100%;
    padding: 13px;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.15s;
    font-family: var(--font);
  }
  .login-btn:hover { opacity: 0.85; }

  .login-error {
    color: #ef4444;
    font-size: 13px;
    margin-top: 10px;
    display: none;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 240px;
    min-width: 240px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  .sidebar-header {
    padding: 20px 16px 14px;
    border-bottom: 1px solid var(--border);
  }

  .app-name {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .app-desc {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 16px 16px 6px;
  }

  .room-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    margin: 0 6px 2px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text);
    transition: background 0.1s;
    user-select: none;
  }

  .room-item:hover { background: var(--hover); }
  .room-item.active { background: var(--accent-light); font-weight: 600; }

  .room-hash {
    color: var(--text-muted);
    font-size: 16px;
    line-height: 1;
  }

  .room-name { flex: 1; }

  .room-count {
    font-size: 11px;
    color: var(--text-muted);
    background: var(--border);
    border-radius: 10px;
    padding: 1px 6px;
    display: none;
  }

  .room-count.has-users { display: block; }

  /* Online users sidebar */
  .online-section {
    margin-top: auto;
    border-top: 1px solid var(--border);
    max-height: 200px;
    overflow-y: auto;
  }

  .online-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    font-size: 13px;
    color: var(--text);
  }

  .online-avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }

  .online-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .online-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--online);
    flex-shrink: 0;
  }

  .online-room-tag {
    font-size: 11px;
    color: var(--text-muted);
  }

  /* ── My User Box ── */
  .user-box {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .my-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
  }

  .my-name {
    font-size: 14px;
    font-weight: 600;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Chat Area ── */
  #chatArea {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    min-width: 0;
  }

  .chat-header {
    padding: 0 24px;
    height: 56px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .chat-header-hash {
    font-size: 20px;
    color: var(--text-muted);
    line-height: 1;
  }

  .chat-header-name {
    font-size: 16px;
    font-weight: 700;
  }

  .chat-header-desc {
    font-size: 13px;
    color: var(--text-muted);
    margin-left: 4px;
    border-left: 1.5px solid var(--border);
    padding-left: 12px;
  }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg-group {
    display: flex;
    flex-direction: column;
    margin-top: 12px;
  }

  .msg-meta {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 4px;
  }

  .msg-username {
    font-size: 14px;
    font-weight: 700;
  }

  .msg-time {
    font-size: 11px;
    color: var(--text-muted);
  }

  .msg-bubble {
    font-size: 14.5px;
    line-height: 1.55;
    color: var(--text);
    padding: 0;
    word-break: break-word;
    white-space: pre-wrap;
    max-width: 680px;
  }

  .msg-bubble img {
    max-width: 320px;
    max-height: 320px;
    border-radius: 10px;
    margin-top: 4px;
    display: block;
    cursor: pointer;
    border: 1px solid var(--border);
    object-fit: cover;
  }

  .msg-system {
    text-align: center;
    font-size: 12px;
    color: var(--text-muted);
    padding: 8px 0;
    margin: 4px 0;
  }

  /* Consecutive messages (no repeat avatar/name) */
  .msg-continued .msg-meta { display: none; }
  .msg-continued { margin-top: 2px; }

  /* Input */
  .input-area {
    padding: 12px 24px 16px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-wrapper {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--msg-other);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 8px 8px 8px 14px;
    transition: border-color 0.15s;
  }

  .input-wrapper:focus-within { border-color: #aaa; }

  #msgInput {
    flex: 1;
    border: none;
    background: transparent;
    font-size: 14.5px;
    font-family: var(--font);
    color: var(--text);
    outline: none;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
    min-height: 22px;
  }

  #msgInput::placeholder { color: var(--text-muted); }

  .input-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 6px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, background 0.15s;
    font-size: 18px;
  }
  .input-btn:hover { color: var(--text); background: var(--hover); }

  .send-btn {
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font);
    transition: opacity 0.15s;
    align-self: flex-end;
  }
  .send-btn:hover { opacity: 0.8; }

  #imageInput { display: none; }

  .input-hint {
    font-size: 11.5px;
    color: var(--text-muted);
    margin-top: 6px;
    padding-left: 2px;
  }

  /* Image lightbox */
  #lightbox {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 999;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
  }
  #lightbox.open { display: flex; }
  #lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }

  /* Welcome day divider */
  .day-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 16px 0;
    font-size: 12px;
    color: var(--text-muted);
  }
  .day-divider::before, .day-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Upload progress */
  .upload-progress {
    font-size: 12px;
    color: var(--text-muted);
    padding: 4px 0;
    display: none;
  }

  @media (max-width: 640px) {
    #sidebar { display: none; }
  }
</style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">新和联胜</div>
    <div class="login-sub">私域聊天室</div>
    <label class="login-label">用户名</label>
    <input class="login-input" id="usernameInput" placeholder="输入你的名字…" maxlength="20" autocomplete="off"/>
    <label class="login-label">进入频道</label>
    <select class="login-input" id="roomSelect" style="cursor:pointer">
      <option value="综合">＃ 综合</option>
      <option value="工作">＃ 工作</option>
      <option value="闲聊">＃ 闲聊</option>
      <option value="图片">＃ 图片</option>
    </select>
    <button class="login-btn" id="joinBtn">进入聊天室</button>
    <div class="login-error" id="loginError">请输入用户名</div>
  </div>
</div>

<!-- Main App -->
<div id="sidebar">
  <div class="sidebar-header">
    <div class="app-name">新和联胜</div>
    <div class="app-desc">私域聊天室</div>
  </div>

  <div class="section-label">频道</div>
  <div id="roomList"></div>

  <div class="online-section">
    <div class="section-label">在线成员</div>
    <div id="onlineList"></div>
  </div>

  <div class="user-box">
    <div class="my-avatar" id="myAvatar">?</div>
    <div class="my-name" id="myName">—</div>
    <div class="online-dot"></div>
  </div>
</div>

<div id="chatArea">
  <div class="chat-header">
    <span class="chat-header-hash">#</span>
    <span class="chat-header-name" id="headerName">综合</span>
    <span class="chat-header-desc" id="headerDesc">欢迎来到新和联胜！</span>
  </div>

  <div id="messages">
    <div class="day-divider">今天</div>
  </div>

  <div class="input-area">
    <div class="upload-progress" id="uploadProgress">📎 正在上传图片…</div>
    <div class="input-wrapper">
      <textarea id="msgInput" rows="1" placeholder="发消息到 #综合…"></textarea>
      <input type="file" id="imageInput" accept="image/*"/>
      <button class="input-btn" id="imageBtn" title="发送图片">📎</button>
      <button class="send-btn" id="sendBtn">发送</button>
    </div>
    <div class="input-hint">按 Enter 发送 · Shift+Enter 换行</div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <img id="lightboxImg" src="" alt=""/>
</div>

<script>
const socket = io();

let myUsername = '';
let myColor = '';
let currentRoom = '综合';
let lastMsgUser = null;
let lastMsgTime = null;

const roomDescs = {
  '综合': '欢迎来到新和联胜！',
  '工作': '工作交流区',
  '闲聊': '随便聊聊',
  '图片': '分享图片',
};

// ── Login ──
const loginScreen = document.getElementById('loginScreen');
const usernameInput = document.getElementById('usernameInput');
const roomSelect = document.getElementById('roomSelect');
const joinBtn = document.getElementById('joinBtn');
const loginError = document.getElementById('loginError');

usernameInput.focus();
usernameInput.addEventListener('keydown', e => { if (e.key === 'Enter') doJoin(); });
joinBtn.addEventListener('click', doJoin);

function doJoin() {
  const name = usernameInput.value.trim();
  if (!name) { loginError.style.display = 'block'; return; }
  loginError.style.display = 'none';
  const room = roomSelect.value;
  currentRoom = room;
  socket.emit('join', { username: name, room });
}

socket.on('userConfirmed', ({ username, color }) => {
  myUsername = username;
  myColor = color;
  loginScreen.style.display = 'none';

  document.getElementById('myName').textContent = username;
  const av = document.getElementById('myAvatar');
  av.textContent = username[0].toUpperCase();
  av.style.background = color;

  updateRoomUI(currentRoom);
});

// ── Rooms ──
socket.on('roomList', (rooms) => {
  const list = document.getElementById('roomList');
  list.innerHTML = '';
  rooms.forEach(r => {
    const el = document.createElement('div');
    el.className = 'room-item' + (r.name === currentRoom ? ' active' : '');
    el.dataset.room = r.name;
    el.innerHTML = `
      <span class="room-hash">#</span>
      <span class="room-name">${r.name}</span>
      <span class="room-count ${r.count > 0 ? 'has-users' : ''}" data-count="${r.name}">${r.count}</span>
    `;
    el.addEventListener('click', () => switchRoom(r.name));
    list.appendChild(el);
  });
});

socket.on('roomUserCount', ({ room, count }) => {
  const el = document.querySelector(`[data-count="${room}"]`);
  if (el) {
    el.textContent = count;
    el.classList.toggle('has-users', count > 0);
  }
  // Update room item count in roomList
  document.querySelectorAll('.room-item').forEach(item => {
    if (item.dataset.room === room) {
      const countEl = item.querySelector('.room-count');
      if (countEl) {
        countEl.textContent = count;
        countEl.classList.toggle('has-users', count > 0);
      }
    }
  });
});

function switchRoom(room) {
  if (room === currentRoom) return;
  currentRoom = room;
  socket.emit('switchRoom', { room });
  updateRoomUI(room);
  clearMessages();
  document.querySelectorAll('.room-item').forEach(el => {
    el.classList.toggle('active', el.dataset.room === room);
  });
}

socket.on('switchedRoom', (room) => {
  currentRoom = room;
  updateRoomUI(room);
});

function updateRoomUI(room) {
  document.getElementById('headerName').textContent = room;
  document.getElementById('headerDesc').textContent = roomDescs[room] || '';
  document.getElementById('msgInput').placeholder = `发消息到 #${room}…`;
  lastMsgUser = null;
  lastMsgTime = null;
}

function clearMessages() {
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '<div class="day-divider">今天</div>';
  lastMsgUser = null;
  lastMsgTime = null;
}

// ── Online Users ──
socket.on('onlineUsers', (users) => {
  const list = document.getElementById('onlineList');
  list.innerHTML = '';
  users.forEach(u => {
    const el = document.createElement('div');
    el.className = 'online-item';
    el.innerHTML = `
      <div class="online-avatar" style="background:${u.color}">${u.name[0].toUpperCase()}</div>
      <span class="online-name">${u.name}</span>
      <span class="online-room-tag">#${u.room}</span>
      <div class="online-dot"></div>
    `;
    list.appendChild(el);
  });
});

// ── Messages ──
socket.on('history', (msgs) => {
  clearMessages();
  msgs.forEach(renderMessage);
  scrollToBottom();
});

socket.on('message', (msg) => {
  renderMessage(msg);
  scrollToBottom();
});

function formatTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}

function isSameMinute(a, b) {
  if (!a || !b) return false;
  const da = new Date(a), db = new Date(b);
  return da.getHours() === db.getHours() && da.getMinutes() === db.getMinutes();
}

function renderMessage(msg) {
  const container = document.getElementById('messages');

  if (msg.type === 'system') {
    lastMsgUser = null;
    lastMsgTime = null;
    const el = document.createElement('div');
    el.className = 'msg-system';
    el.textContent = msg.text;
    container.appendChild(el);
    return;
  }

  const isContinued = msg.username === lastMsgUser && isSameMinute(msg.timestamp, lastMsgTime);
  lastMsgUser = msg.username;
  lastMsgTime = msg.timestamp;

  const group = document.createElement('div');
  group.className = 'msg-group' + (isContinued ? ' msg-continued' : '');

  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  meta.innerHTML = `
    <span class="msg-username" style="color:${msg.color}">${escHtml(msg.username)}</span>
    <span class="msg-time">${formatTime(msg.timestamp)}</span>
  `;
  group.appendChild(meta);

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  if (msg.type === 'image') {
    const img = document.createElement('img');
    img.src = msg.url;
    img.alt = '图片';
    img.loading = 'lazy';
    img.addEventListener('click', () => openLightbox(msg.url));
    bubble.appendChild(img);
  } else {
    bubble.textContent = msg.text;
  }

  group.appendChild(bubble);
  container.appendChild(group);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function scrollToBottom() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

// ── Send ──
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');

sendBtn.addEventListener('click', sendText);
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendText();
  }
});

msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
});

function sendText() {
  const text = msgInput.value;
  if (!text.trim() || !myUsername) return;
  socket.emit('sendMessage', { text, room: currentRoom });
  msgInput.value = '';
  msgInput.style.height = 'auto';
}

// ── Image Upload ──
const imageBtn = document.getElementById('imageBtn');
const imageInput = document.getElementById('imageInput');
const uploadProgress = document.getElementById('uploadProgress');

imageBtn.addEventListener('click', () => imageInput.click());

imageInput.addEventListener('change', async () => {
  const file = imageInput.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) {
    alert('图片太大了，最多 5MB');
    return;
  }

  uploadProgress.style.display = 'block';
  const formData = new FormData();
  formData.append('image', file);

  try {
    const res = await fetch('/upload', { method: 'POST', body: formData });
    const data = await res.json();
    if (data.url) {
      socket.emit('sendImage', { url: data.url, room: currentRoom });
    }
  } catch (e) {
    alert('上传失败，请重试');
  } finally {
    uploadProgress.style.display = 'none';
    imageInput.value = '';
  }
});

// ── Lightbox ──
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');

function openLightbox(src) {
  lightboxImg.src = src;
  lightbox.classList.add('open');
}

lightbox.addEventListener('click', () => lightbox.classList.remove('open'));
</script>
</body>
</html>
